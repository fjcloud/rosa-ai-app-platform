apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Red Hat OpenShift AI (RHOAI)
  - rhoai-namespace.yaml
  - rhoai-operatorgroup.yaml
  - rhoai-subscription.yaml
  # Node Feature Discovery (NFD)
  - nfd-namespace.yaml
  - nfd-operatorgroup.yaml
  - nfd-subscription.yaml
  # NVIDIA GPU Operator
  - nvidia-namespace.yaml
  - nvidia-operatorgroup.yaml
  - nvidia-subscription.yaml
  # OpenShift Dev Spaces
  - devspaces-subscription.yaml
  # OpenShift GitOps (Argo CD)
  - gitops-namespace.yaml
  - gitops-operatorgroup.yaml
  - gitops-subscription.yaml
  # OpenShift Pipelines (Tekton)
  - pipelines-subscription.yaml
  # Bundled Tekton catalog tasks (git-clone, buildah) for developer pipelines
  - tekton-tasks.yaml
