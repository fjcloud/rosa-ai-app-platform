# Tekton tasks bundled for the workshop.
# These tasks are referenced by the developer pipeline via:
#   resolver: cluster / namespace: openshift-pipelines
# Param names follow the OpenShift Pipelines ClusterTask convention (uppercase).
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: openshift-pipelines
  labels:
    app.kubernetes.io/version: "workshop"
  annotations:
    tekton.dev/displayName: git clone
spec:
  workspaces:
    - name: output
      description: The git repo will be cloned onto the volume backing this Workspace.
  params:
    - name: URL
      description: Repository URL to clone from.
      type: string
    - name: REVISION
      description: Revision to checkout (branch, tag, sha).
      type: string
      default: "main"
    - name: DEPTH
      description: Perform a shallow clone.
      type: string
      default: "1"
    - name: SSL_VERIFY
      description: Set http.sslVerify.
      type: string
      default: "true"
    - name: DELETE_EXISTING
      description: Clean destination directory before cloning.
      type: string
      default: "true"
    - name: SUBDIRECTORY
      description: Subdirectory to clone into.
      type: string
      default: ""
  results:
    - name: commit
      description: The precise commit SHA fetched.
    - name: url
      description: The URL that was fetched.
  steps:
    - name: clone
      image: alpine/git:latest
      workingDir: $(workspaces.output.path)
      script: |
        #!/bin/sh
        set -eu
        CHECKOUT_DIR="$(workspaces.output.path)/$(params.SUBDIRECTORY)"
        if [ "$(params.DELETE_EXISTING)" = "true" ] && [ -d "${CHECKOUT_DIR}" ]; then
          find "${CHECKOUT_DIR}" -mindepth 1 -delete 2>/dev/null || true
        fi
        mkdir -p "${CHECKOUT_DIR}"
        git -c http.sslVerify=$(params.SSL_VERIFY) clone \
          --depth $(params.DEPTH) \
          --branch $(params.REVISION) \
          $(params.URL) "${CHECKOUT_DIR}" || \
        git -c http.sslVerify=$(params.SSL_VERIFY) clone \
          --depth $(params.DEPTH) \
          $(params.URL) "${CHECKOUT_DIR}"
        cd "${CHECKOUT_DIR}"
        git checkout $(params.REVISION) 2>/dev/null || true
        COMMIT=$(git rev-parse HEAD)
        echo -n "${COMMIT}" > $(results.commit.path)
        echo -n "$(params.URL)" > $(results.url.path)
        echo "Cloned $(params.URL) @ ${COMMIT}"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: buildah
  namespace: openshift-pipelines
  labels:
    app.kubernetes.io/version: "workshop"
  annotations:
    tekton.dev/displayName: buildah
spec:
  params:
    - name: IMAGE
      description: Reference of the image buildah will produce.
      type: string
    - name: DOCKERFILE
      description: Path to the Dockerfile to build.
      type: string
      default: ./Dockerfile
    - name: CONTEXT
      description: Path to the directory to use as build context.
      type: string
      default: .
    - name: TLSVERIFY
      description: Verify TLS on the registry endpoint.
      type: string
      default: "false"
    - name: FORMAT
      description: The format of the built container (oci or docker).
      type: string
      default: "oci"
    - name: STORAGE_DRIVER
      description: Buildah storage driver.
      type: string
      default: vfs
    - name: BUILD_EXTRA_ARGS
      description: Extra parameters for the build command.
      type: string
      default: ""
    - name: PUSH_EXTRA_ARGS
      description: Extra parameters for the push command.
      type: string
      default: ""
  workspaces:
    - name: source
  results:
    - name: IMAGE_DIGEST
      description: Digest of the image built.
    - name: IMAGE_URL
      description: Image repository where the built image was pushed.
  steps:
    - name: build-and-push
      image: quay.io/buildah/stable:latest
      workingDir: $(workspaces.source.path)
      securityContext:
        privileged: true
      script: |
        #!/bin/bash
        set -eu
        buildah --storage-driver=$(params.STORAGE_DRIVER) bud \
          $(params.BUILD_EXTRA_ARGS) \
          --format=$(params.FORMAT) \
          --tls-verify=$(params.TLSVERIFY) \
          --no-cache \
          -f $(params.DOCKERFILE) \
          -t $(params.IMAGE) \
          $(params.CONTEXT)

        buildah --storage-driver=$(params.STORAGE_DRIVER) push \
          $(params.PUSH_EXTRA_ARGS) \
          --tls-verify=$(params.TLSVERIFY) \
          --digestfile /tmp/image-digest \
          $(params.IMAGE) \
          docker://$(params.IMAGE)

        cat /tmp/image-digest | tee $(results.IMAGE_DIGEST.path)
        echo -n "$(params.IMAGE)" | tee $(results.IMAGE_URL.path)
      volumeMounts:
        - name: varlibcontainers
          mountPath: /var/lib/containers
  volumes:
    - name: varlibcontainers
      emptyDir: {}
