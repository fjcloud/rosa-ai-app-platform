apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3
  namespace: llm-serving
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
  labels:
    opendatahub.io/dashboard: "true"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    deploymentStrategy:
      type: Recreate
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: qwen-model-cache
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      resources:
        requests:
          nvidia.com/gpu: "1"
          memory: 8Gi
          cpu: 500m
        limits:
          nvidia.com/gpu: "1"
          memory: 24Gi
          cpu: "2"
      volumeMounts:
        - name: model-cache
          mountPath: /opt/models
